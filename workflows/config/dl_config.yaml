# Pipeline configuration for Deep Learning PRS prediction

# Base paths
base_dir: "/Users/max/Desktop/PRS_Models/nextflow_pipeline_prs"
input_plink: "${base_dir}/data/raw/UKB_CRC/UKB_CRC"  # PLINK file prefix
phenotype_file: "/data/raw/UKB_CRC/UKB_CRC.pheno"  # Optional, if not in PLINK

model_type: "bayesian"  # Options: bayesian, standard

# Data reuse configuration
data_reuse:
  use_existing_converted: false
  existing_genotype_file: ""
  existing_phenotype_file: ""
  use_existing_splits: false
  existing_splits_file: ""

# Training parameters
n_folds: 5
test_size: 0.2
val_size: 0.1
seed: 42
max_epochs: 50
batch_size: 64
learning_rate: 0.0001  # 1e-5

# Hyperparameter optimization
hyperopt:
  enabled: false
  n_trials: 20

# Weights & Biases configuration
use_wandb: true
wandb_project: "prs-prediction-crc"
wandb_entity: ""

# Optional features
create_visualizations: false