# Configuration for Sklearn Models Pipeline

base_dir: /Users/max/Desktop/PRS_Models/nextflow_pipeline_prs
# input_plink_sklearn: /data/qc/UKB_BRC.QC  # PLINK file prefix
input_plink_sklearn: /data/raw/UKB_BRC/UKB_BRC_filtered_13 # PLINK file prefix
input_phenotype_file: /data/raw/UKB_BRC/UKB_BRC.pheno  # Phenotype CSV file

# Data preprocessing
data:
  input_format: 'h5'  # Use HDF5 format from DL pipeline
  handle_missing: 'zero'  # impute, drop, zero
  imputation_strategy: 'mean'  # mean, median, most_frequent
  scaling: false
  scale_method: 'standard'  # standard, minmax, robust
  auto_detect_task: true  # Automatically detect classification vs regression
  encoding: "raw"  # Genotype encoding: 'raw', 'one-hot', 'two-dim'

# Add this section to your config file
data_reuse:
  use_existing_converted: true  # Set to true to skip CONVERT_PLINK_SKLEARN
  existing_genotype_file: "genotypes_test.h5"     # Path to existing genotype file (h5/npz)
  existing_phenotype_file: "phenotypes_test.csv"    # Path to existing phenotype file

  use_existing_splits: true     # Set to true to skip SPLIT_DATA_SKLEARN
  existing_splits_file: "indices_test.npz"       # Path to existing splits NPZ file

  use_existing_cv_folds: true   # Set to true to skip CREATE_CV_FOLDS
  existing_cv_folds_file: "splits_test.json"     # Path to existing CV folds JSON file

# Feature selection
feature_selection:
  enabled: false
  n_features: 500
  methods: ['lasso']
   # - univariate  # f_regression or f_classif
   # - lasso       # L1 regularization
   # - rf          # Random Forest importance
   # - mutual_info # Mutual information
  univariate_percentile: 10
  lasso_alpha: 0.01
  combine_method: 'union'  # union, intersection, weighted

# Data splitting
splitting:
  test_size: 0.2
  val_size: 0.1
  n_folds: 5
  stratify: 'auto'  # auto, true, false - auto detects binary classification
  shuffle: true
  seed: 42

# Models to train (will adapt to classification/regression automatically)
models:
  linear:
    enabled: false
    name: 'Linear Model'  # LinearRegression or LogisticRegression
    optimize: false
  
  ridge:
    enabled: false
    name: 'Ridge'
    optimize: true
    n_trials: 50
  
  lasso:
    enabled: false
    name: 'Lasso'
    optimize: true
    n_trials: 50
  
  elasticnet:
    enabled: true
    name: 'Elastic Net'
    optimize: true
    n_trials: 50
  
  rf:
    enabled: true
    name: 'Random Forest'
    optimize: true
    n_trials: 50
    default_params:
      n_estimators: 500
      max_depth: 50
      min_samples_split: 10
      class_weight: 'balanced'  # For classification
      bootstrap: True
      max_features: 'log2'
  
  gbm:
    enabled: false
    name: 'Gradient Boosting'
    optimize: true
    n_trials: 100
    default_params:
      n_estimators: 100
      learning_rate: 0.1
      max_depth: 5
  
  xgboost:
    enabled: true
    name: 'XGBoost'
    optimize: true
    n_trials: 50
    default_params:
      n_estimators: 5000
      learning_rate: 0.01
      max_depth: 4
  
  svm:
    enabled: true
    name: 'Support Vector Machine'
    optimize: true
    n_trials: 50
    default_params:
      kernel: 'rbf'  # linear, rbf, poly

  linear_svm:
    enabled: false
    name: 'Linear SVM'
    optimize: true
    n_trials: 5
    default_params:
      loss: 'hinge'  # hinge or squared_hinge

# Ensemble methods (optional)
ensemble:
  enabled: false  # Set to false by default
  methods:
    - voting     # Average predictions
    - stacking   # Meta-learner
  stacking_cv_folds: 3
  meta_learner: 'ridge'  # Model for stacking

# Training settings
training:
  n_jobs: -1  # Use all cores
  random_state: 42
  verbose: 1
  early_stopping: false
  patience: 10

# Hyperparameter optimization
hyperopt:
  enabled: true
  framework: 'optuna'
  n_trials_default: 50
  timeout: 3600  # Max time in seconds per model
  n_jobs: -1
  pruning: true
  sampler: 'tpe'

# Evaluation metrics (will use appropriate metrics based on task)
metrics:
  # For regression
  regression:
    primary: 'r2'
    calculate:
      - mse
      - rmse
      - mae
      - r2
      - explained_variance
      - pearson_r
      - spearman_r
  
  # For classification
  classification:
    primary: 'roc_auc'
    calculate:
      - accuracy
      - precision
      - recall
      - f1
      - roc_auc
      - pr_auc
      - confusion_matrix

# Interpretability
interpretability:
  shap_analysis: false
  shap_samples: 10
  feature_importance: false
  partial_dependence: false
  pdp_features: 10

# Visualization
visualization:
  enabled: true
  formats: ['png', 'pdf', 'html']
  plots:
    - learning_curves
    - feature_importance
    - residual_plots  # For regression
    - confusion_matrix  # For classification
    - roc_curve  # For classification

# Logging
logging:
  level: 'INFO'
  mlflow: false
  wandb: false
  csv_log: true

# Output settings
output:
  save_models: false
  save_predictions: true
  save_preprocessor: true
  model_format: 'pickle'
  compression: false