# Training configuration for Polygenic Risk Score prediction pipeline

# Model configuration for PRS prediction
model:
  model_type: "cnn"  # Options: mlp, cnn, transformer, attention, bayesian/bnn, point_transformer, lstm
  
  # MLP specific parameters (recommended for PRS)
  hidden_dims: [1000, 250, 50]  # Deeper network for complex genetic patterns
  dropout_rate: 0.2
  activation: "relu"  # Options: relu, elu, leaky_relu
  batch_norm: true
  
  # CNN specific parameters (if model_type: cnn)
  channels: [32, 64, 128]
  kernel_sizes: [7, 5, 3]
  pool_sizes: [2, 2, 2]
  fc_dims: [256, 128]
  
  # Transformer specific parameters (if model_type: transformer)
  d_model: 64
  n_heads: 8
  n_layers: 4
  d_ff: 1024
  
  # Attention specific parameters (if model_type: attention)
  hidden_dim: 64
  attention_dim: 128
  n_attention_heads: 2
  
  # Bayesian Neural Network parameters (if model_type: bayesian/bnn)
  hidden_dims: [1024, 256, 64]  
  compressed_dim: 512          # Deterministic compression before Bayesian layers
  compressor_layers: 1
  compressor_dropout: 0.1
  prior_pi: 0.75               # Mixture weight for slab component
  prior_sigma1: 1.0            # Slab std (broad)
  prior_sigma2: 0.01          # Spike std (narrow, encourages sparsity)
  init_log_var: -3.0           # Initial posterior log-variance
  n_samples: 10                # MC forward passes for uncertainty estimation
  kl_weight: 0.0             # KL multiplier (useful for warm-up schedules)
  task: "binary"                 # 'binary' for disease phenotypes, 'regression' for quantitative traits

  kl_warmup_epochs: 30        # Linear ramp from 0 → kl_weight
  n_val_samples: 30            # MC samples for validation uncertainty

 
  # LSTM specific parameters (if model_type: lstm)
  hidden_dim: 256
  n_layers: 2
  dropout_rate: 0.3

# Optimizer configuration
optimizer:
  type: "adamw"  # Options: adam, adamw, sgd
  lr: 0.0001
  weight_decay: 0.01
  # SGD specific
  momentum: 0.9

# Learning rate scheduler
scheduler:
  type: "reduce_on_plateau"  # Options: step, cosine, reduce_on_plateau
  # ReduceLROnPlateau specific
  patience: 10
  factor: 0.1
  # StepLR specific
  step_size: 30
  gamma: 0.1

# Training parameters
max_epochs: 50
batch_size: 64
num_workers: 5
gradient_clip: 1.0

# Loss function
loss_function: "auto"  # Options: mse, mae, huber, crossentropy, auto (recommended)

# Early stopping
early_stopping:
  patience: 20
  min_delta: 0.0001

# Data augmentation
augment_train: false
augmentation_params:
  snp_dropout: 0.1
  noise_std: 0.05
  shuffle_regions: 10

# Logging with Weights & Biases
use_wandb: true  # Enable W&B logging
wandb_project: "prs-prediction-crc"
wandb_entity: null  # Set to your W&B username/team
log_interval: 10
save_checkpoint_interval: 5

# Hardware
use_cuda: false
cuda_deterministic: false
seed: 42
n_gpus: 1

# Data preprocessing
preprocessing:
  impute_missing: false
  standardize: false
  remove_low_maf: false
  maf_threshold: 0.01
  
# Cross-validation
cv:
  n_folds: 5
  stratified: true

# Evaluation metrics
metrics:
  - mse
  - mae
  - r2
  - correlation
  - explained_variance

# Hyperparameter search space (for Optuna)
hyperparameter_search:
  model_type:
    type: categorical
    choices: ["mlp", "cnn", "transformer", "attention"]
  
  learning_rate:
    type: float
    low: 1e-5
    high: 1e-2
    log: true
  
  dropout_rate:
    type: float
    low: 0.1
    high: 0.5
  
  batch_size:
    type: categorical
    choices: [16, 32, 64, 128]
  
  weight_decay:
    type: float
    low: 1e-6
    high: 1e-2
    log: true