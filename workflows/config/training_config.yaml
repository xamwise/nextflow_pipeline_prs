# Training configuration for Polygenic Risk Score prediction pipeline

# Model configuration for PRS prediction
model:
  model_type: "advanced_mlp"  # Options: mlp, cnn, transformer, attention, bayesian/bnn, point_transformer, lstm, mlp_regression, cnn_regression, lstm_regression, advanced_mlp, advanced_cnn, advanced_lstm
  
  # Parameters used across multiple model types 
  dropout_rate: 0.3 # Used in all models
  activation: "relu"  # Options: relu, elu, leaky_relu, used in MLP, Bayesian, and advanced models
  norm: 'batch'  # batch, layer, or none; for advanced models


  # MLP specific parameters (recommended for PRS)
  hidden_dims: [32]  # Deeper network for complex genetic patterns
  batch_norm: True

  # Advanced MLP specific parameters
  wide_skip: True  # Add skip connection from input to final layer (like Wide & Deep)


  # CNN specific parameters (if model_type: cnn)
  channels: [16, 32]  # More channels for deeper feature extraction
  kernel_sizes: [7, 5]
  pool_sizes: [3, 3]
  fc_dims: [32]

  # Advanced CNN specific parameters
  pool_type: 'avg'  # max or avg
  
  # LSTM specific parameters (if model_type: lstm)
  hidden_dim: 250
  n_layers: 2
  pool: 'mean'  # mean, max, mean_max, last
  
  # Transformer specific parameters (if model_type: transformer)
  d_model: 64
  n_heads: 4
  n_layers: 2
  d_ff: 256
  max_seq_len: 252  # Adjust based on number of SNPs
  
  # Attention specific parameters (if model_type: attention)
  # hidden_dim: 256
  attention_dim: 128
  n_attention_heads: 2
  
  # Bayesian Neural Network parameters (if model_type: bayesian/bnn)
  hidden_dims: [32]
  compressed_dim: 500         # Deterministic compression before Bayesian layers
  compressor_layers: 0
  compressor_dropout: 0.1
  prior_pi: 0.25             # Mixture weight for slab component
  prior_sigma1: 1.0            # Slab std (broad)
  prior_sigma2: 0.01          # Spike std (narrow, encourages sparsity)
  init_log_var: -14.0           # Initial posterior log-variance
  n_samples: 30                # MC forward passes for uncertainty estimation
  kl_weight: 0.01             # KL multiplier (useful for warm-up schedules)
  task: "binary"                 # 'binary' for disease phenotypes, 'regression' for quantitative traits

  # Bayesian-specific training parameters
  kl_warmup_epochs: 5        # Linear ramp from 0 → kl_weight
  n_val_samples: 30            # MC samples for validation uncertainty


# Optimizer configuration
optimizer:
  type: "adamw"  # Options: adam, adamw, sgd
  lr: 0.0003
  weight_decay: 0.9
  # SGD specific
  momentum: 0.9

# Learning rate scheduler
scheduler:
  type: "reduce_on_plateau"  # Options: step, cosine, reduce_on_plateau
  # ReduceLROnPlateau specific
  patience: 5
  factor: 0.5
  # StepLR specific
  step_size: 10
  gamma: 0.1

# Training parameters
max_epochs: 60
batch_size: 16
num_workers: 5
gradient_clip: 1.0

# Loss function
loss_function: "auto"  # Options: mse, mae, huber, crossentropy, auto (recommended), bce_ls (binary cross-entropy with label smoothing)
label_smoothing: 0.05  # Only used if loss_function is crossentropy with label smoothing

# Early stopping
early_stopping:
  patience: 15
  min_delta: 0.0001

# Data augmentation
augment_train: true
augmentation_params:
  snp_dropout: 0.2
  # noise_std: 0.05
  # shuffle_regions: 10

# Logging with Weights & Biases
use_wandb: true  # Enable W&B logging
wandb_project: "prs-prediction-local"  
wandb_entity: null  # Set to your W&B username/team
log_interval: 10
save_checkpoint_interval: 5

# Hardware
use_cuda: false
cuda_deterministic: false
seed: 42
n_gpus: 1

# Data preprocessing
preprocessing:
  impute_missing: false
  standardize: false
  remove_low_maf: false
  maf_threshold: 0.01
  
# Cross-validation
cv:
  n_folds: 5
  stratified: True

# Evaluation metrics
metrics:
  - mse
  - mae
  - r2
  - correlation
  - explained_variance

# Hyperparameter search space (for Optuna)
hyperparameter_search:
  model_type:
    type: categorical
    # choices: ["mlp", "cnn", "transformer", "attention"]
  
  learning_rate:
    type: float
    low: 1e-5
    high: 1e-2
    log: true
  
  dropout_rate:
    type: float
    low: 0.1
    high: 0.5
  
  batch_size:
    type: categorical
    choices: [16, 32, 64, 128]
  
  weight_decay:
    type: float
    low: 1e-6
    high: 1e-2
    log: true